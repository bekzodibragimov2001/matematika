<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathDash — Test Muhiti</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link rel="stylesheet" href="/css/shared.css">
<style>
    body { min-height: 100vh; padding: 2rem; display: flex; justify-content: center; }
    .dashboard-wrapper { max-width: 1200px; width: 100%; display: flex; flex-direction: column; gap: 1.5rem; }
    .top-modules { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .stat-module { background: var(--bg-module); padding: 1.2rem 1.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
    .stat-info h3 { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-info p { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-top: 4px; }
    .stat-info p.accent-text { color: var(--accent); }
    .stat-icon { width: 45px; height: 45px; background: #E0F2FE; color: var(--primary); border-radius: var(--radius-sm); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

    .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
    .quiz-content { display: flex; flex-direction: column; gap: 1.5rem; }
    .question-module { background: var(--bg-module); padding: 2.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    .question-text { font-size: 1.15rem; line-height: 1.7; margin-bottom: 1.5rem; color: var(--text-dark); }
    .question-math { font-size: 1.6rem; text-align: center; padding: 2rem; background: #F8FAFC; border-radius: var(--radius-sm); border-left: 4px solid var(--primary); margin-bottom: 1rem; }
    .topic-tag { display: inline-block; background: #E0F2FE; color: var(--primary); font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.7rem; border-radius: 20px; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }

    .options-module { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .option-card { background: var(--bg-module); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 1.2rem; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 1rem; box-shadow: var(--shadow-sm); }
    .option-card:hover { border-color: var(--primary); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .option-card.selected { border-color: var(--accent); background: #F0FDF4; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
    .opt-letter { width: 36px; height: 36px; background: #F1F5F9; color: var(--text-muted); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 600; font-size: 1.1rem; transition: 0.2s; }
    .option-card.selected .opt-letter { background: var(--accent); color: #fff; }
    .opt-content { font-size: 1.1rem; color: var(--text-dark); }

    .controls-module { background: var(--bg-module); padding: 1.2rem 1.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .btn-submit { background: var(--accent); color: #fff; padding: 0.8rem 2rem; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
    .btn-submit:hover { background: var(--accent-hover); transform: translateY(-2px); }

    .sidebar-module { background: var(--bg-module); padding: 1.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-md); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 1.2rem; position: sticky; top: 2rem; }
    .sidebar-title { font-size: 1.1rem; font-weight: 600; color: var(--text-dark); border-bottom: 2px dashed var(--border); padding-bottom: 0.8rem; display: flex; align-items: center; gap: 8px; }
    .q-nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
    .q-nav-item { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.85rem; cursor: pointer; background: #F1F5F9; color: var(--text-muted); }
    .q-nav-item.answered { background: #D1FAE5; color: #065F46; }
    .q-nav-item.current { outline: 2px solid var(--primary); }

    @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } .sidebar-module { position: relative; top: 0; } }
    @media (max-width: 768px) { .top-modules { grid-template-columns: 1fr; gap: 1rem; } body { padding: 1rem; } }
    @media (max-width: 600px) { .options-module { grid-template-columns: 1fr; } .controls-module { flex-direction: column; gap: 1rem; } .btn { width: 100%; justify-content: center; } }
</style>
</head>
<body>

<div class="dashboard-wrapper">
    <header class="top-modules">
        <div class="stat-module">
            <div class="stat-info"><h3>Joriy Savol</h3><p id="progress-text">- / -</p></div>
            <div class="stat-icon">📊</div>
        </div>
        <div class="stat-module">
            <div class="stat-info"><h3>To'plangan Ball</h3><p class="accent-text" id="score-text">0</p></div>
            <div class="stat-icon" style="background:#F0FDF4;color:var(--accent);">🏆</div>
        </div>
        <div class="stat-module">
            <div class="stat-info"><h3>Qolgan Vaqt</h3><p id="timer-text">--:--</p></div>
            <div class="stat-icon" style="background:#FEF2F2;color:#EF4444;">⏱️</div>
        </div>
    </header>

    <main class="main-layout">
        <section class="quiz-content">
            <div class="question-module">
                <div class="topic-tag" id="q-topic">Mavzu</div>
                <div class="question-text" id="q-text">Yuklanmoqda...</div>
                <div class="question-math" id="q-math"></div>
            </div>
            <div class="options-module" id="options-container"></div>
            <div class="controls-module">
                <button class="btn btn-muted" id="btn-prev" onclick="changeQuestion(-1)">← Oldingi</button>
                <button class="btn btn-submit" id="btn-submit" onclick="submitCurrent()">Tasdiqlash ✔</button>
                <button class="btn btn-muted" id="btn-next" onclick="changeQuestion(1)">Keyingi →</button>
            </div>
        </section>

        <aside class="sidebar-module">
            <div class="sidebar-title"><span>🧭</span> Savollar xaritasi</div>
            <div class="q-nav-grid" id="q-nav"></div>
        </aside>
    </main>
</div>

<script src="/js/api.js"></script>
<script>
    if (!getToken()) window.location.href = '/index.html';

    const urlParams = new URLSearchParams(window.location.search);
    const testId = Number(urlParams.get('testId'));
    if (!testId) window.location.href = '/dashboard.html';

    let attemptId = null;
    let questions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let isSubmitted = [];
    let currentScore = 0;
    let questionStartTime = Date.now();
    let timeInSeconds = 1200;
    let timerHandle = null;

    const elQText = document.getElementById('q-text');
    const elQMath = document.getElementById('q-math');
    const elQTopic = document.getElementById('q-topic');
    const elOptions = document.getElementById('options-container');
    const elProgress = document.getElementById('progress-text');
    const elScore = document.getElementById('score-text');
    const elTimer = document.getElementById('timer-text');
    const elNav = document.getElementById('q-nav');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnSubmit = document.getElementById('btn-submit');

    async function startTest() {
        try {
            const data = await api('/api/tests/start', { method: 'POST', body: { testId } });
            attemptId = data.attemptId;
            questions = data.questions;
            userAnswers = new Array(questions.length).fill(null);
            isSubmitted = new Array(questions.length).fill(false);
            timeInSeconds = data.test.timeLimitMinutes * 60;
            startTimer();
            renderNav();
            renderQuestion();
        } catch (e) {
            showToast(e.message, 'error');
            setTimeout(() => window.location.href = '/dashboard.html', 1500);
        }
    }

    function renderNav() {
        elNav.innerHTML = questions.map((q, idx) => `
            <div class="q-nav-item ${isSubmitted[idx] ? 'answered' : ''} ${idx === currentIndex ? 'current' : ''}"
                 onclick="jumpTo(${idx})">${idx + 1}</div>
        `).join('');
    }

    function jumpTo(idx) { currentIndex = idx; renderQuestion(); }

    function renderQuestion() {
        questionStartTime = Date.now();
        const q = questions[currentIndex];

        elProgress.innerText = `${currentIndex + 1} / ${questions.length}`;
        elQTopic.innerText = q.topic;
        elQText.innerText = q.text;
        elQMath.innerHTML = q.math ? `\\[ ${q.math} \\]` : '';

        elOptions.innerHTML = '';
        const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
        q.options.forEach((opt, idx) => {
            const card = document.createElement('div');
            card.className = `option-card ${userAnswers[currentIndex] === idx ? 'selected' : ''}`;
            if (!isSubmitted[currentIndex]) {
                card.onclick = () => selectOption(idx);
            } else {
                card.style.cursor = 'default';
                if (userAnswers[currentIndex] === idx) {
                    const correct = q.lastCorrect;
                    card.style.borderColor = correct ? 'var(--accent)' : '#EF4444';
                    card.style.background = correct ? '#F0FDF4' : '#FEF2F2';
                }
            }
            card.innerHTML = `<div class="opt-letter">${labels[idx]}</div><div class="opt-content">\\( ${opt} \\)</div>`;
            elOptions.appendChild(card);
        });

        if (window.MathJax) MathJax.typesetPromise([elQMath, elOptions]);

        btnPrev.disabled = currentIndex === 0;
        btnNext.disabled = currentIndex === questions.length - 1;

        if (isSubmitted[currentIndex]) {
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Tasdiqlangan';
            btnSubmit.style.background = 'var(--text-muted)';
        } else {
            btnSubmit.disabled = userAnswers[currentIndex] === null;
            btnSubmit.innerText = 'Tasdiqlash ✔';
            btnSubmit.style.background = 'var(--accent)';
        }
        renderNav();
    }

    function selectOption(idx) {
        if (isSubmitted[currentIndex]) return;
        userAnswers[currentIndex] = idx;
        renderQuestion();
    }

    function changeQuestion(step) {
        const next = currentIndex + step;
        if (next < 0 || next >= questions.length) return;
        currentIndex = next;
        renderQuestion();
    }

    async function submitCurrent() {
        if (userAnswers[currentIndex] === null || isSubmitted[currentIndex]) return;
        const timeSpent = Math.round((Date.now() - questionStartTime) / 1000);
        const q = questions[currentIndex];

        try {
            const result = await api('/api/attempts/answer', {
                method: 'POST',
                body: {
                    attemptId,
                    questionId: q.id,
                    selectedIndex: userAnswers[currentIndex],
                    timeSpentSeconds: timeSpent
                }
            });
            q.lastCorrect = result.isCorrect;
            isSubmitted[currentIndex] = true;
            if (result.isCorrect) {
                currentScore += 5;
                elScore.innerText = currentScore;
            }
            renderQuestion();

            setTimeout(() => {
                if (currentIndex < questions.length - 1) {
                    changeQuestion(1);
                } else {
                    checkIfAllDone();
                }
            }, 1200);
        } catch (e) {
            showToast(e.message, 'error');
        }
    }

    async function checkIfAllDone() {
        if (isSubmitted.every(v => v === true)) {
            await finishAttempt();
        }
    }

    async function finishAttempt() {
        clearInterval(timerHandle);
        try {
            const data = await api('/api/attempts/finish', { method: 'POST', body: { attemptId } });
            alert(`Test yakunlandi! Yakuniy balingiz: ${data.score} / ${data.totalQuestions * 5}`);
        } catch (e) {
            showToast(e.message, 'error');
        }
        window.location.href = '/dashboard.html';
    }

    function startTimer() {
        timerHandle = setInterval(async () => {
            if (timeInSeconds <= 0) {
                await finishAttempt();
                return;
            }
            timeInSeconds--;
            const m = Math.floor(timeInSeconds / 60);
            const s = timeInSeconds % 60;
            elTimer.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (timeInSeconds <= 60) elTimer.style.color = '#EF4444';
        }, 1000);
    }

    startTest();
</script>
</body>
</html>
